<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สถานีตรวจอากาศจังหวัด</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dashboard.css">

</head>

<body class="dashboard-body">

<div class="station">

    <a href="index.html" class="back-link">← กลับสู่แผนที่</a>

    <header class="station-head">
        <div class="station-eyebrow">STATION READOUT</div>
        <h1 id="provinceName">—</h1>
        <div class="station-coords" id="provinceCoords">lat —, lon —</div>
    </header>

    <div id="loading" class="loading">กำลังรับสัญญาณจากสถานีตรวจอากาศ…</div>
    <div id="errorBox" class="error-box" hidden></div>

    <main id="readout" class="readout" hidden>

        <section class="temp-panel">
            <div class="temp-main">
                <span id="temperature">--</span><span class="temp-unit">°C</span>
            </div>
            <div class="temp-sub">
                <span id="weatherIcon" class="weather-icon">☀️</span>
                <span id="weatherDesc">—</span>
            </div>
            <div class="temp-feels">รู้สึกเหมือน <span id="feelsLike">--</span>°C</div>
        </section>

        <section class="metric-grid">

            <div class="metric">
                <div class="metric-label">ความชื้น</div>
                <div class="metric-value"><span id="humidity">--</span><span class="metric-unit">%</span></div>
            </div>

            <div class="metric">
                <div class="metric-label">ลม</div>
                <div class="metric-value"><span id="windSpeed">--</span><span class="metric-unit">กม./ชม.</span></div>
                <div class="metric-sub" id="windDir">—</div>
            </div>

            <div class="metric">
                <div class="metric-label">ปริมาณน้ำฝน</div>
                <div class="metric-value"><span id="precip">--</span><span class="metric-unit">มม.</span></div>
            </div>

            <div class="metric">
                <div class="metric-label">เมฆปกคลุม</div>
                <div class="metric-value"><span id="cloud">--</span><span class="metric-unit">%</span></div>
            </div>

            <div class="metric">
                <div class="metric-label">ความกดอากาศ</div>
                <div class="metric-value"><span id="pressure">--</span><span class="metric-unit">hPa</span></div>
            </div>

            <div class="metric">
                <div class="metric-label">สูงสุด / ต่ำสุดวันนี้</div>
                <div class="metric-value minmax"><span id="tempMax">--</span>° / <span id="tempMin">--</span>°</div>
            </div>

        </section>

        <footer class="station-foot">
            <span>อัปเดตล่าสุด <span id="updatedAt">—</span></span>
            <span class="source">ข้อมูลจาก Open-Meteo</span>
        </footer>

    </main>

</div>

<script src="dashboard.js"></script>

</body>
</html>
